{% extends 'base.html' %}

{% block content %}

<h2>All Tickets</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Priority</th>
        <th>Status</th>
    </tr>

    {% for ticket in tickets %}
    <tr>
        <td>{{ ticket.id }}</td>
        <td>
            <a href="{{ url_for('ticket_detail', ticket_id=ticket.id) }}">
                {{ ticket.title }}
            </a>
        </td>
        <td>{{ ticket.priority }}</td>
        <td>{{ ticket.status }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
